name: jinja
version: 0.6.2
description: >-
  Jinja2 template engine for Dart.
  Variables, expressions, control structures and template inheritance.
repository: https://github.com/ykmnkmi/jinja.dart
funding:
  - https://www.buymeacoffee.com/ykmnkmi

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  html_unescape: ^2.0.0
  intl: ^0.20.2
  json_path: ^0.7.6
  meta: ^1.16.0
  path: ^1.9.1
  string_scanner: ^1.4.1
  textwrap: ^2.0.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.26.2
